<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>日翊假勤排班管理系統 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E24B4A;--red-bg:#FCEBEB;--red-bd:#F7C1C1;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-bd:#C0DD97;
  --pink:#D4537E;--pink-bg:#FBEAF0;--pink-bd:#F4C0D1;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-bd:#B5D4F4;
  --orange:#E65100;--orange-bg:#FFF3E0;--orange-bd:#FFCC80;
  --purple:#6A1B9A;--purple-bg:#F3E5F5;--purple-bd:#CE93D8;
  --teal:#00695C;--teal-bg:#E0F2F1;--teal-bd:#80CBC4;
  --bg:#FFFFFF;--bg2:#F7F6F2;--text:#1A1916;--text2:#6B6860;--bd:#E2E0D8;
}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.topbar h1{font-size:14px;font-weight:600}
.main-tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0;overflow-x:auto}
.main-tab{padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.main-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.main-tab:hover:not(.active){color:var(--text)}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow-y:auto;padding:12px 14px}
.panel.active{display:flex;flex-direction:column;gap:10px}
.ctrl-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
select,input[type=text],input[type=date]{height:30px;padding:0 8px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--bg);color:var(--text);outline:none}
select:focus,input:focus{border-color:#999}
.btn{height:30px;padding:0 11px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;border:none;white-space:nowrap}
.btn:hover{opacity:.8}
.btn-p{background:var(--text);color:var(--bg)}
.btn-s{background:transparent;border:1px solid var(--bd);color:var(--text)}
.btn-s:hover{background:var(--bg2)}
.btn-red{background:var(--red-bg);color:#A32D2D;border:1px solid var(--red-bd)}
.btn-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;line-height:1.5}
.tag-s{background:var(--red-bg);color:#A32D2D;border:1px solid var(--red-bd)}
.tag-c{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.tag-b{background:var(--pink-bg);color:#993556;border:1px solid var(--pink-bd)}
.tag-o{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.tag-meeting{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)}
.tag-dept{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.tag-class{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-bd)}
.tag-warn{background:#FFF9C4;color:#856404;border:1px solid #FFE082}
.legend{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legbox{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.cal-outer{overflow:auto;flex:1;border:1px solid var(--bd);border-radius:6px}
.cal-table{border-collapse:collapse;font-size:11px}
.cal-table th{padding:3px 2px;text-align:center;background:var(--bg2);color:var(--text2);border:1px solid var(--bd);font-weight:500;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:2;min-width:30px}
.cal-table th.sticky-name{position:sticky;left:0;z-index:3;background:var(--bg2);min-width:90px;text-align:left;padding:3px 6px}
.cal-table td{padding:2px 1px;border:1px solid #EEE;text-align:center;vertical-align:middle;min-width:30px;height:26px}
.cal-table td.name-cell{position:sticky;left:0;background:var(--bg2);text-align:left;padding:2px 6px;font-weight:500;z-index:1;white-space:nowrap;font-size:11px}
.cal-table td.day-sun{background:#FFF5F5}
.cal-table td.day-sat{background:#F5F8FF}
.cal-table td.day-locked{cursor:not-allowed}
.cal-table td.day-click{cursor:pointer}
.cal-table td.day-click:hover{filter:brightness(.95)}
.day-x{color:#ccc;font-size:12px;font-weight:700}
.section-card{border:1px solid var(--bd);border-radius:8px;padding:12px;background:var(--bg)}
.section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.maint-table{width:100%;border-collapse:collapse;font-size:12px}
.maint-table th{padding:6px 8px;background:var(--bg2);border:1px solid var(--bd);font-weight:500;color:var(--text2);font-size:11px;text-align:left}
.maint-table td{padding:5px 8px;border:1px solid var(--bd);vertical-align:middle}
.maint-table tr:hover td{background:var(--bg2)}
.stat-pills{display:flex;gap:6px;flex-wrap:wrap;padding:6px 8px}
.spill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:16px;z-index:101;width:260px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.popup h3{font-size:13px;font-weight:600;margin-bottom:10px}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.popup-btn{padding:8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;border:none}
.popup-btn:hover{opacity:.85}
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.export-card{border:1px solid var(--bd);border-radius:8px;padding:10px 12px;background:var(--bg);display:flex;flex-direction:column;gap:6px}
.export-card-title{font-size:13px;font-weight:600}
.export-card-sub{font-size:11px;color:var(--text2)}
.cond-row{display:flex;gap:6px;align-items:center;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);flex-wrap:wrap}
.cb-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.cb-group label{font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer}
.multi-date-picker{display:flex;flex-direction:column;gap:4px}
.date-chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);border-radius:4px;padding:2px 6px;font-size:11px}
.date-chip button{border:none;background:none;cursor:pointer;color:var(--blue);font-size:12px;padding:0;line-height:1}
.cell-tags{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;line-height:1.2}
</style>
</head><body>
<div class="app">
<div class="topbar">
  <span style="font-size:16px">📅</span>
  <h1>日翊假勤排班管理系統 2026</h1>
  <div style="margin-left:auto;font-size:11px;color:var(--text2)" id="clk"></div>
</div>
<div class="main-tabs">
  <div class="main-tab active" onclick="goMain('fill')">📋 填寫假勤</div>
  <div class="main-tab" onclick="goMain('maintain')">🔧 課別維護</div>
  <div class="main-tab" onclick="goMain('export')">📤 各課匯出</div>
</div>
<div class="content">

<!-- FILL -->
<div id="panel-fill" class="panel active">
  <div class="ctrl-row">
    <select id="f-year"><option value="2026">2026年</option></select>
    <select id="f-month" onchange="rebuildCal();renderFillConds()"></select>
    <select id="f-bu" onchange="updateFCourse();rebuildCal()">
      <option value="">選部別</option><option>一部</option><option>二部</option><option>業務部</option>
    </select>
    <select id="f-ke" onchange="rebuildCal();renderFillConds()"><option value="">選課別</option></select>
    <span id="anomaly-msg" style="font-size:11px;font-weight:600;color:var(--red);display:none"></span>
  </div>
  <!-- 每月條件區塊（嵌在填寫頁） -->
  <div id="fill-conds-section" style="border:1px solid var(--purple-bd);border-radius:8px;padding:10px 12px;background:var(--purple-bg);display:none">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600;color:var(--purple)">⚙️ 本課每月條件</span>
      <span id="fill-conds-course-label" style="font-size:11px;color:var(--text2)"></span>
      <button class="btn" style="height:26px;font-size:11px;padding:0 9px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)" onclick="toggleLeavePanel()">📊 特休總覽</button>
      <button class="btn" style="height:26px;font-size:11px;padding:0 9px;background:var(--purple);color:#fff;border:none;margin-left:auto" onclick="toggleCondForm()">＋ 新增條件</button>
    </div>
    <!-- 新增條件表單（預設隱藏） -->
    <div id="cond-inline-form" style="display:none;border:1px solid var(--purple-bd);border-radius:6px;padding:10px;background:#fff;margin-bottom:8px">
      <!-- 條件類型選擇 -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer"><input type="radio" name="cond-type" value="combined" checked onchange="condTypeChange()"> 特休＋換休合計上限</label>
        <label style="font-size:11px;display:flex;align-items:center;gap:3px;cursor:pointer"><input type="radio" name="cond-type" value="special" onchange="condTypeChange()"> 特殊條件（指定日期）</label>
      </div>
      <!-- 特休+換休合計上限 -->
      <div id="cond-form-combined" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:7px">
        <span style="font-size:12px;font-weight:600;color:var(--purple)">特休＋換休</span>
        <span style="font-size:12px">每日合計上限</span>
        <input type="number" id="cond-combined-count" value="4" min="1" max="99" style="width:50px;height:28px;padding:0 6px">
        <span style="font-size:12px">人（全月每日套用）</span>
      </div>
      <!-- 特殊條件：指定日期上限 -->
      <div id="cond-form-special" style="display:none;flex-direction:column;gap:8px;margin-bottom:7px">
        <div style="font-size:11px;color:var(--text2)">指定日期的特休＋換休合計上限（優先於全月條件）</div>
        <div id="special-rows" style="display:flex;flex-direction:column;gap:6px"></div>
        <button type="button" class="btn btn-s" style="height:26px;font-size:11px;width:fit-content" onclick="addSpecialRow()">＋ 新增日期</button>
      </div>

      <div style="display:flex;gap:6px">
        <button class="btn btn-p" style="height:26px;font-size:11px" onclick="addConditionInline()">確認新增</button>
        <button class="btn btn-s" style="height:26px;font-size:11px" onclick="toggleCondForm()">取消</button>
      </div>
    </div>
    <!-- 條件列表 -->
    <div id="fill-cond-list" style="display:flex;flex-direction:column;gap:5px"></div>
  </div>
  <div class="legend">
    <div class="leg"><div class="legbox" style="background:var(--red-bg);border:1px solid var(--red-bd)"></div>特休</div>
    <div class="leg"><div class="legbox" style="background:var(--green-bg);border:1px solid var(--green-bd)"></div>換休</div>
    <div class="leg"><div class="legbox" style="background:var(--pink-bg);border:1px solid var(--pink-bd)"></div>生日</div>
    <div class="leg"><div class="legbox" style="background:var(--blue-bg);border:1px solid var(--blue-bd)"></div>加班</div>
    <div class="leg"><div class="legbox" style="background:var(--purple-bg);border:1px solid var(--purple-bd)"></div>課會(全課)</div>
    <div class="leg"><div class="legbox" style="background:var(--orange-bg);border:1px solid var(--orange-bd)"></div>部務(課長)</div>
    <div class="leg"><div class="legbox" style="background:var(--teal-bg);border:1px solid var(--teal-bd)"></div>上課</div>
    <div class="leg"><div class="legbox" style="background:#FFF3E0;border:1px solid #FFCC80"></div>國定假日</div>
    <div class="leg"><div class="legbox" style="background:#FFF5F5"></div>週日(✕)</div>
    <div class="leg"><div class="legbox" style="background:#FFFDE7;border:1px solid #FFE082"></div>他業帶組</div>
    <div class="leg"><div class="legbox" style="background:#F3E5F5;border:1px solid var(--purple-bd)"></div>出差</div>
  </div>
  <div id="fill-hint" style="text-align:center;padding:40px;color:var(--text2)">請選擇年月與課別後開始填寫</div>
  <div class="cal-outer" id="cal-outer" style="display:none">
    <div id="cal-stats" class="stat-pills"></div>
    <table class="cal-table" id="cal-table"></table>
  </div>
</div>

<!-- MAINTAIN -->
<div id="panel-maintain" class="panel">
  <div class="ctrl-row">
    <select id="m-bu" onchange="updateMCourse()">
      <option value="">選部別</option><option>一部</option><option>二部</option><option>業務部</option>
    </select>
    <select id="m-ke" onchange="loadMaintain()"><option value="">選課別</option></select>
    <select id="m-month" onchange="loadMaintain()"></select>
  </div>
  <div id="maint-content" style="color:var(--text2);font-size:12px;text-align:center;padding:30px">請選擇部別與課別</div>
</div>

<!-- CONDITIONS -->


<!-- EXPORT -->
<div id="panel-export" class="panel">
  <div class="ctrl-row">
    <select id="exp-year"><option value="2026">2026年</option></select>
    <select id="exp-month" onchange="renderExport()"></select>
    <button class="btn btn-s" onclick="renderExport()">重新整理</button>
    <button class="btn btn-orange" onclick="exportYewuCalendar()">📅 匯出他業點檢行事曆 (全部)</button>
  </div>
  <div id="export-grid" class="export-grid" style="margin-top:8px"></div>
  <div id="export-result" style="margin-top:8px"></div>
</div>

</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="closePopup()"></div>
<div class="popup" id="popup" style="display:none">
  <h3 id="popup-title">選擇假別</h3>
  <div class="popup-grid">
    <div class="popup-btn tag-s" onclick="setCell('s')">✦ 特休</div>
    <div class="popup-btn tag-c" onclick="setCell('c')">⇄ 換休</div>
    <div class="popup-btn tag-b" onclick="setCell('b')">🎂 生日</div>
    <div class="popup-btn tag-o" onclick="setCell('o')">⏰ 加班</div>
  </div>
  <button class="btn btn-s" style="width:100%;font-size:11px;margin-top:4px" onclick="setCell(null)">清除此格</button>
</div>

// 取得某人今年度特休天數
function getAnnualLeave(name){ return (PERSON_INFO[name]||{}).annual||0; }
// 取得某人生日 [month, day]

// 計算2026年特休：從到職日往後推一年的區間內可休天數
function getLeaveYearInfo(name){
  const hire=getHireDate(name);
  if(!hire)return null;
  const hd=new Date(hire);
  const today=new Date('2026-05-06');
  // 找2026年內最近的週年
  let anniversary=new Date(hd);
  anniversary.setFullYear(2026);
  if(anniversary<new Date('2026-01-01')) anniversary.setFullYear(2027);
  // Prev anniversary
  let prevAnniv=new Date(anniversary);
  prevAnniv.setFullYear(anniversary.getFullYear()-1);
  return {
    annual: getAnnualLeave(name),
    from: prevAnniv.toISOString().slice(0,10),
    to: new Date(anniversary.getTime()-86400000).toISOString().slice(0,10)
  };
}  // conditionsMap[course][month] = [{...}]

function getLeave(c,n,y,m,d){return leaveData[c]?.[n]?.[y]?.[m]?.[d]||null}
function setLeave(c,n,y,m,d,t){
  if(!leaveData[c])leaveData[c]={};if(!leaveData[c][n])leaveData[c][n]={};
  if(!leaveData[c][n][y])leaveData[c][n][y]={};if(!leaveData[c][n][y][m])leaveData[c][n][y][m]={};
  if(t===null)delete leaveData[c][n][y][m][d];else leaveData[c][n][y][m][d]=t;
}
function isHoliday(m,d){return !!(HOLIDAYS_2026[m]?.[d])}
function holidayName(m,d){return HOLIDAYS_2026[m]?.[d]||''}
function isOT(c,y,m,d){
  const ov=otOverride[c]?.[y]?.[m]?.[d];if(ov===false)return false;
  const dow=new Date(y,m-1,d).getDay();return dow===6||isHoliday(m,d);
}
function getMaintKey(course,year,month){return `${course}_${year}_${month}`;}
function getMaint(course,year,month){
  const k=getMaintKey(course,year,month);
  if(!maintainData[k])maintainData[k]={transport:{},nozone:{},yewuBand:{},yewuNosqc:{},yewu:{},yewuRows:[],tripRows:[],meeting:[],dept:[],classRows:[]}; // classRows item: {date,time,note,persons:[]}
  return maintainData[k];
}

// ===== CALENDAR EXTRA: get meeting/dept/class days for a course/month =====
function getMeetingDays(course,year,month){
  const d=getMaint(course,year,month);
  return (d.meeting||[]).map(r=>r.date?parseInt(r.date.split('-')[2]):null).filter(Boolean);
}
function getDeptDays(course,year,month){
  const d=getMaint(course,year,month);
  return (d.dept||[]).map(r=>r.date?parseInt(r.date.split('-')[2]):null).filter(Boolean);
}
function getClassDays(course,year,month){
  const d=getMaint(course,year,month);
  return (d.classRows||[]).map(r=>r.date?parseInt(r.date.split('-')[2]):null).filter(Boolean);
}
function getClassDaysForPerson(course,year,month,personName){
  const d=getMaint(course,year,month);
  return (d.classRows||[])
    .filter(function(r){return r.date&&(!r.persons||r.persons.length===0||r.persons.includes(personName));})
    .map(function(r){return parseInt(r.date.split('-')[2]);})
    .filter(Boolean);
}
function getMeetingTime(course,year,month,day){
  const d=getMaint(course,year,month);
  const r=(d.meeting||[]).find(r=>r.date&&parseInt(r.date.split('-')[2])===day);
  return r?r.time:'整天';
}
function getDeptTime(course,year,month,day){
  const d=getMaint(course,year,month);
  const r=(d.dept||[]).find(r=>r.date&&parseInt(r.date.split('-')[2])===day);
  return r?r.time:'整天';
}
// 取得某人在某天的他業帶組資訊
function getYewuForPersonDay(course,year,month,day,personName){
  const d=getMaint(course,year,month);
  return (d.yewuRows||[]).filter(function(r){
    if(!r.date)return false;
    const rd=parseInt(r.date.split('-')[2]);
    const rm=parseInt(r.date.split('-')[1]);
    return rd===day&&rm===month&&r.person===personName;
  });
}
// 取得某人在某天的出差資訊
function getTripForPersonDay(course,year,month,day,personName){
  const d=getMaint(course,year,month);
  return (d.tripRows||[]).filter(function(r){
    return r.person===personName&&(r.dates||[]).some(function(dt){
      const rd=parseInt(dt.split('-')[2]);
      const rm=parseInt(dt.split('-')[1]);
      return rd===day&&rm===month;
    });
  });
}
function getClassTime(course,year,month,day){
  const d=getMaint(course,year,month);
  const r=(d.classRows||[]).find(r=>r.date&&parseInt(r.date.split('-')[2])===day);
  return r?r.time:'整天';
}


function getConds(course,month){
  if(!conditionsMap[course])conditionsMap[course]={};
  if(!conditionsMap[course][month])conditionsMap[course][month]=[];
  return conditionsMap[course][month];
}
function getAllConds(month){
  // gather all courses' conditions for a given month (used for display)
  const all=[];
  Object.keys(conditionsMap).forEach(course=>{
    (conditionsMap[course][month]||[]).forEach(c=>all.push({...c,course}));
  });
  return all;
}

function rebuildCal(){
  const course=document.getElementById('f-ke').value;
  const year=parseInt(document.getElementById('f-year').value);
  const month=parseInt(document.getElementById('f-month').value);
  if(!course){document.getElementById('fill-hint').style.display='block';document.getElementById('cal-outer').style.display='none';return;}
  document.getElementById('fill-hint').style.display='none';document.getElementById('cal-outer').style.display='block';
  buildCalTable(course,year,month);
}

function buildCalTable(course,year,month){
  const people=ALL.filter(p=>p.課別===course);
  const daysInMonth=new Date(year,month,0).getDate();
  const DOW=['日','一','二','三','四','五','六'];
  const nextMonth=month===12?1:month+1;
  const nextYear=month===12?year+1:year;
  // dayOrder: {d, m, y} — d=1 at end is NEXT month's 1st
  const dayOrder=[];
  for(let d=2;d<=daysInMonth;d++)dayOrder.push({d,m:month,y:year});
  dayOrder.push({d:1,m:nextMonth,y:nextYear});
  const meetDays=getMeetingDays(course,year,month);
  const deptDays=getDeptDays(course,year,month);
  const classDays=getClassDays(course,year,month);

  checkAnomalies(course,year,month,people);

  // Header
  let hdr=`<tr><th class="sticky-name">姓名</th>`;
  dayOrder.forEach(function(o){
    const dateObj=new Date(o.y,o.m-1,o.d);
    const dow=DOW[dateObj.getDay()];
    const isSun=dateObj.getDay()===0;
    const isSat=dateObj.getDay()===6;
    const isHol=isHoliday(o.m,o.d);
    const hname=holidayName(o.m,o.d);
    const isNextMonth=o.m!==month;
    const col=isSun?'color:#E24B4A':isSat?'color:#185FA5':isHol?'color:#E65100':'';
    const hn=hname?`<div style="font-size:8px;color:#E65100;line-height:1">${hname.slice(0,2)}</div>`:'';
    const nextLabel=isNextMonth?'<div style="font-size:8px;color:#999;line-height:1">次月</div>':'';
    const hasMeet=meetDays.includes(o.d)&&!isNextMonth;
    const hasDept=deptDays.includes(o.d)&&!isNextMonth;
    const hasClass=classDays.includes(o.d)&&!isNextMonth;
    const dots=(hasMeet?'<span style="color:var(--purple);font-size:8px">●</span>':'')+(hasDept?'<span style="color:var(--orange);font-size:8px">●</span>':'')+(hasClass?'<span style="color:var(--teal);font-size:8px">●</span>':'');
    hdr+=`<th style="${col}">${o.d}<br><span style="font-size:9px">${dow}</span>${nextLabel}${hn}${dots}</th>`;
  });
  hdr+='</tr>';

  // OT row
  let otRow=`<tr><td class="name-cell" style="color:var(--text2);font-size:10px">週六/假日<br>加班開關</td>`;
  dayOrder.forEach(function(o){
    const dateObj=new Date(o.y,o.m-1,o.d);
    const isSun=dateObj.getDay()===0;
    const isSat=dateObj.getDay()===6;
    const isHol=isHoliday(o.m,o.d);
    const isNextMonth=o.m!==month;
    if(isSun){otRow+=`<td class="day-sun"><span class="day-x">✕</span></td>`;}
    else if((isSat||isHol)&&!isNextMonth){
      const on=isOT(course,year,o.m,o.d);
      otRow+=`<td style="background:${on?'var(--blue-bg)':'#FFF5F5'};cursor:pointer" onclick="toggleOT('${course}',${year},${o.m},${o.d})">
        <span style="font-size:10px;font-weight:700;color:${on?'var(--blue)':'#ccc'}">${on?'班':'✕'}</span></td>`;
    }else{otRow+=`<td></td>`;}
  });
  otRow+='</tr>';

  // People rows
  const rows=people.map(p=>{
    const isMgr=p.職稱==='課長';
    var pinfo2=PERSON_INFO[p.姓名]||{};
    var annualDays=pinfo2.annual||0;
    var usedDays=getPersonSpecialUsed(course,year,p.姓名);
    var remainDays=Math.max(0,annualDays-usedDays);
    var badgeColor=remainDays===0?'background:#FCEBEB;color:#A32D2D':remainDays<=3?'background:#FFF9C4;color:#856404':'background:#E6F1FB;color:#185FA5';
    var annualBadge=annualDays>0
      ?'<span style="'+badgeColor+';border-radius:3px;padding:0 3px;font-size:8px;font-weight:600">特'+annualDays+'天/剩'+remainDays+'天</span>'
      :'';
    let r=`<td class="name-cell">${p.姓名}<br><span style="font-size:9px;color:var(--text2);font-weight:400">${p.職稱}</span><br>${annualBadge}</td>`;
    dayOrder.forEach(function(o){
      const dateObj=new Date(o.y,o.m-1,o.d);
      const isSun=dateObj.getDay()===0;
      const isSat=dateObj.getDay()===6;
      const isHol=isHoliday(o.m,o.d);
      const isNextMonth=o.m!==month;
      const on=isOT(course,o.y,o.m,o.d);
      const t=getLeave(course,p.姓名,year,month,o.d); // leave stored by calendar slot
      const hasMeet=meetDays.includes(o.d)&&!isNextMonth;
      const hasDept=deptDays.includes(o.d)&&isMgr&&!isNextMonth;
      const personClassDays=getClassDaysForPerson(course,year,month,p.姓名);
      const hasClass=personClassDays.includes(o.d)&&!isNextMonth;
      const d=o.d; // keep d alias for onclick references

      if(isSun){
        r+=`<td class="day-sun day-locked"><span class="day-x">✕</span></td>`;
      }else{
        // Background priority: leave > meeting/dept/class > OT > holiday > sat > default
        let bg='',extraTags='';
        if(t){bg={s:'background:var(--red-bg)',c:'background:var(--green-bg)',b:'background:var(--pink-bg)',o:'background:var(--blue-bg)'}[t];}
        else if(hasMeet){bg='background:var(--purple-bg)';}
        else if(hasDept){bg='background:var(--orange-bg)';}
        else if(hasClass){bg='background:var(--teal-bg)';}
        else if(on){bg='background:var(--blue-bg)';}
        else if(isHol){bg='background:#FFF3E0';}
        else if(isSat){bg='background:#F5F8FF';}

        // 他業帶組 & 出差
        var yewuRows2=getYewuForPersonDay(course,year,month,d,p.姓名);
        // 生日標記（在行事曆上顯示生日當天）
        var pbday=getBirthday(p.姓名);
        var isBirthday=pbday&&pbday[0]===o.m&&pbday[1]===o.d;
        var tripRows2=getTripForPersonDay(course,year,month,d,p.姓名);
        var hasYewu=yewuRows2.length>0;
        var hasTrip=tripRows2.length>0;
        var lbl=t?{s:'特休',c:'換休',b:'生日',o:'加班'}[t]:'';

        // Collect events for this cell
        var evs=[];
        if(hasMeet){evs.push({lbl:'課會',color:'var(--purple-bg)',tc:'var(--purple)',time:getMeetingTime(course,year,month,d)});}

        } else {

function checkAnomalies(course,year,month,people){
  const daysInMonth=new Date(year,month,0).getDate();let warnings=[];
  let otCount=0;for(let d=1;d<=daysInMonth;d++){if(isOT(course,year,month,d))otCount++;}
  if(otCount<2)warnings.push(`⚠ 可加班日僅${otCount}天，低於最低(2天)！`);
  const conds=getConds(course,month);
  // Check special day conditions first (priority)
  const specialConds=conds.filter(cond=>cond.limitType==='special');
  const anomNextMonth=month===12?1:month+1;
  // Build set of (m-d) keys covered by special
  const specialDaySet=new Set(specialConds.map(c=>`${c.specialDayMonth}-${c.specialDayDate}`));
  specialConds.forEach(cond=>{
    const d=cond.specialDayDate;
    const m=cond.specialDayMonth;
    // For next month day 1, it appears as day=1 in the calendar but belongs to next month
    const calDay=(m===month)?d:(m===anomNextMonth&&d===1?1:-1);
    if(calDay===-1)return;
    const cnt=people.filter(p=>{const lv=getLeave(course,p.姓名,year,month,calDay);return lv==='s'||lv==='c';}).length;
    const label=m===month?`${month}/${d}`:`次月${d}日`;
    if(cnt>cond.specialMax)warnings.push(`⚠ ${label} 特殊條件：特休+換休${cnt}人，超過上限${cond.specialMax}人`);
  });
  // Check combined s+c limit (skip days covered by special)
  const combinedC=conds.find(cond=>cond.limitType==='combined');
  if(combinedC){
    for(let d=1;d<=daysInMonth;d++){
      // day=1 maps to next month's 1st in calendar
      const lookupKey=d===1?`${anomNextMonth}-1`:`${month}-${d}`;
      if(specialDaySet.has(lookupKey))continue; // special takes priority
      const cnt=people.filter(p=>{const lv=getLeave(course,p.姓名,year,month,d);return lv==='s'||lv==='c';}).length;
      if(cnt>combinedC.combinedMax)warnings.push(`⚠ ${month}/${d} 特休+換休合計${cnt}人，超過上限${combinedC.combinedMax}人`);
    }
  }
  const el=document.getElementById('anomaly-msg');
  el.style.display=warnings.length?'inline':'none';
  el.textContent=warnings.join(' ／ ');
}

function getPersonSpecialUsed(course,year,person){
  // Count all months' special leave for this person this year
  var total=0;
  for(var m=1;m<=12;m++){
    var dim2=new Date(year,m,0).getDate();
    for(var d=1;d<=dim2;d++){
      if(getLeave(course,person,year,m,d)==='s')total++;
    }
  }
  // Also check next month's day 1 stored under current month
  return total;
}
function getPersonSpecialUsedMonth(course,year,month,person){
  var total=0;
  var dim=new Date(year,month,0).getDate();
  for(var d=1;d<=dim;d++){
    if(getLeave(course,person,year,month,d)==='s')total++;
  }
  return total;
}
function updateCalStats(course,year,month,people,meetDays,deptDays,classDays){
  const dim=new Date(year,month,0).getDate();
  let s=0,c=0,b=0,o=0;
  people.forEach(p=>{for(let d=1;d<=dim;d++){const t=getLeave(course,p.姓名,year,month,d);if(t==='s')s++;else if(t==='c')c++;else if(t==='b')b++;else if(t==='o')o++;}});
  let otDays=0;for(let d=1;d<=dim;d++){if(isOT(course,year,month,d))otDays++;}
  const conds4stats=getConds(course,month);
  const combinedCond=conds4stats.find(x=>x.limitType==='combined');
  const specialCount=conds4stats.filter(x=>x.limitType==='special').length;
  const combinedPill=combinedCond?`<span class="spill" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bd)">特休+換休合計 ${s+c}人次</span>`:'';
  const specialPill=specialCount>0?`<span class="spill" style="background:#FFF9C4;color:#856404;border:1px solid #FFE082">⭐特殊條件 ${specialCount}日</span>`:'';
  document.getElementById('cal-stats').innerHTML=
    `<span class="spill tag-s">特休 ${s}人次</span><span class="spill tag-c">換休 ${c}人次</span>${combinedPill}${specialPill}<span class="spill tag-b">生日 ${b}人次</span><span class="spill tag-o">加班 ${o}人次</span>`+
    `<span class="spill" style="background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)">可加班日 ${otDays}天${otDays<2?' ⚠':''}</span>`+
    (meetDays.length?`<span class="spill tag-meeting">課會 ${meetDays.length}天</span>`:'')+
    (deptDays.length?`<span class="spill tag-dept">部務 ${deptDays.length}天</span>`:'')+
    (classDays.length?`<span class="spill tag-class">上課 ${classDays.length}天</span>`:'');
}

function openPopup(course,name,year,month,day,isNextMonthDay1=false){
  popupCtx={course,name,year,month,day,isNextMonthDay1};
  const hname=holidayName(month,day);
  document.getElementById('popup-title').textContent=`${name} — ${month}月${day}日${hname?' ('+hname+')':''}`;
  document.getElementById('popup').style.display='block';document.getElementById('overlay').style.display='block';
}
function closePopup(){document.getElementById('popup').style.display='none';document.getElementById('overlay').style.display='none';}
function setCell(t){
  const{course,name,year,month,day,isNextMonthDay1}=popupCtx;
  if(t){
    const people=ALL.filter(p=>p.課別===course);
    const conds=getConds(course,month);
    // 0. Check annual leave limit for special leave
    if(t==='s'){
      const pinfo=PERSON_INFO[name]||{};
      const annualMax=pinfo.annual||0;
      if(annualMax>0){
        const used=getPersonSpecialUsed(course,year,name);
        // If currently this cell already has 's', don't count it again
        const currentCell=getLeave(course,name,year,month,day);
        const effectiveUsed=currentCell==='s'?used-1:used;
        if(effectiveUsed>=annualMax){
          showCellBlock(`${name} 特休已用 ${effectiveUsed} 天，達到年度上限 ${annualMax} 天，無法填入`);
          return;
        }
      }
    }
    // 1. Check "only" condition - block other types
    const onlyC=conds.find(c=>c.limitType==='only');
    if(onlyC&&t!==onlyC.allowType&&t!=='o'){
      const LNAMES={s:'特休',c:'換休',b:'生日',o:'加班'};
      showCellBlock(`本月限制：僅限填寫「${LNAMES[onlyC.allowType]}」假，無法填入「${LNAMES[t]}」`);
      return;
    }
    // 2. Check special day condition (highest priority)
    if(t==='s'||t==='c'){
      // day here is the calendar day number within current month
    // next month's 1 is represented in the calendar as day=1 but month context differs
    // We match: if specialDayMonth===month and specialDayDate===day,
    //           OR if specialDayMonth===nextMonth and specialDayDate===day (next month's 1)
    const calNextMonth=month===12?1:month+1;
    const effectiveMonth=isNextMonthDay1?calNextMonth:month;
    const specialC=conds.find(c=>c.limitType==='special'&&
      c.specialDayMonth===effectiveMonth&&c.specialDayDate===day
    );
      if(specialC){
        const cnt=people.filter(p=>{
          const lv=getLeave(course,p.姓名,year,month,day);
          return (lv==='s'||lv==='c')&&p.姓名!==name;
        }).length;
        if(cnt>=specialC.specialMax){
          showCellBlock(`${month}/${day} 特殊條件：特休＋換休合計已達上限 ${specialC.specialMax} 人（目前 ${cnt} 人），無法填入`);
          return;
        }
      } else {
        // 3. Check combined limit (only if no special for this day)
        const combinedC=conds.find(c=>c.limitType==='combined');
        if(combinedC){
          const cnt=people.filter(p=>{
            const lv=getLeave(course,p.姓名,year,month,day);
            return (lv==='s'||lv==='c')&&p.姓名!==name;
          }).length;
          if(cnt>=combinedC.combinedMax){
            showCellBlock(`${month}/${day} 特休＋換休合計已達上限 ${combinedC.combinedMax} 人（目前 ${cnt} 人），無法填入`);
            return;
          }
        }
      }
    }
  }
  setLeave(course,name,year,month,day,t);closePopup();rebuildCal();
}
function showCellBlock(msg){
  // Show a non-blocking toast inside popup instead of alert
  let toast=document.getElementById('cell-block-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='cell-block-toast';
    toast.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-60px);background:#A32D2D;color:#fff;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:280px;text-align:center;';
    document.body.appendChild(toast);
  }
  toast.textContent=msg;
  toast.style.display='block';
  closePopup();
  setTimeout(()=>{toast.style.display='none';},3000);
}

function setMaint(key,field,name,val){const d=getMaintByKey(key);if(d)d[field][name]=val;}
function getMaintByKey(key){return maintainData[key];}
function toggleYewu(key,name,yw,checked){
  const d=getMaintByKey(key);if(!d)return;
  if(!d.yewu[name])d.yewu[name]=[];
  const arr=d.yewu[name];
  if(checked){if(!arr.includes(yw))arr.push(yw);}
  else{const i=arr.indexOf(yw);if(i>-1)arr.splice(i,1);}
}
function toggleYewuField(key,field,name,yw,checked){
  const d=getMaintByKey(key);if(!d)return;
  if(!d[field])d[field]={};
  if(!d[field][name])d[field][name]=[];
  const arr=d[field][name];
  if(checked){if(!arr.includes(yw))arr.push(yw);}
  else{const i=arr.indexOf(yw);if(i>-1)arr.splice(i,1);}

  // 若勾選「帶組」且該項目也在「他業(不含SQC)」清單中，自動同步勾選
  if(field==='yewuBand'&&YEWU_NOSQC.includes(yw)){
    if(!d.yewuNosqc)d.yewuNosqc={};
    if(!d.yewuNosqc[name])d.yewuNosqc[name]=[];
    const nosqcArr=d.yewuNosqc[name];
    if(checked){
      if(!nosqcArr.includes(yw))nosqcArr.push(yw);
    } else {
      const ni=nosqcArr.indexOf(yw);if(ni>-1)nosqcArr.splice(ni,1);
    }
    // Update the nosqc checkbox UI
    syncNosqcCheckbox(key,name,yw,checked);
  }
}
function syncNosqcCheckbox(key,name,yw,checked){
  // Find the nosqc checkbox for this person/item and update it
  const tbody=document.querySelector('#maint-content table.maint-table tbody');
  if(!tbody)return;
  const rows=tbody.querySelectorAll('tr');
  rows.forEach(function(tr){
    const nameCell=tr.querySelector('td:first-child');
    if(!nameCell||!nameCell.textContent.includes(name))return;
    const nosqcCell=tr.querySelector('td:nth-child(5)');
    if(!nosqcCell)return;
    const labels=nosqcCell.querySelectorAll('label');
    labels.forEach(function(label){
      if(label.textContent.trim()===yw){
        const cb=label.querySelector('input[type=checkbox]');
        if(cb)cb.checked=checked;
      }
    });
  });
}

function setTripRange(key,i,side,val){
  const row=getMaintByKey(key).tripRows[i];

}
function refreshTripRange(key,i){
  const row=getMaintByKey(key).tripRows[i];
  const from=row.dateFrom,to=row.dateTo;
  const daysEl=document.getElementById(`trip-days-${key}-${i}`);
  const chipsEl=document.getElementById(`trip-chips-${key}-${i}`);
  if(!from){if(daysEl)daysEl.textContent='';if(chipsEl)chipsEl.innerHTML='';return;}
  const end=to||from;
  const d1=new Date(from),d2=new Date(end);
  if(d2<d1){if(daysEl)daysEl.textContent='⚠ 日期錯誤';return;}
  const days=Math.round((d2-d1)/(86400000))+1;
  if(daysEl)daysEl.textContent=`共${days}天`;
  // generate chips
  row.dates=[];
  for(let dt=new Date(d1);dt<=d2;dt.setDate(dt.getDate()+1)){
    row.dates.push(dt.toISOString().slice(0,10));
  }
  if(chipsEl)chipsEl.innerHTML=row.dates.map(dt=>`<span class="date-chip">${dt.slice(5)}</span>`).join('');
}

  const dim=new Date(2026,month,0).getDate();

  const dayOrder=[];
  for(let d=2;d<=dim;d++)dayOrder.push({m:month,d:d});
  dayOrder.push({m:nextMonth,d:1});
  return dayOrder.map(function(o){
    const val=o.m+'-'+o.d;
    const label=o.m===month?(o.d+'日'):('次月1日('+nextMonth+'/1)');

function addConditionInline(){
  const course=getFillCourse();
  const month=getFillMonth();
  if(!course){showCellBlock('請先選擇課別');return;}
  const limitType=document.querySelector('input[name="cond-type"]:checked').value;
  let combinedMax=null,specialDays=null;
  if(limitType==='combined'){
    combinedMax=parseInt(document.getElementById('cond-combined-count').value)||4;
    let autoNote=`特休＋換休 每日合計上限 ${combinedMax} 人`;
    getConds(course,month).push({note:autoNote,limitType:'combined',combinedMax});
  }else if(limitType==='special'){
    const valid=specialRowsTemp.filter(r=>r.day&&r.max);
    if(valid.length===0){showCellBlock('請至少設定一個日期');return;}
    valid.forEach(r=>{
      // r.day format: "m-d" e.g. "5-15" or "6-1" for next month
      const parts=r.day.toString().split('-');
      const dm=parseInt(parts[0]),dd=parseInt(parts[1]);
      const isNext=dm!==month;
      const label=isNext?`次月${dd}日(${dm}/${dd})`:`${dm}/${dd}`;
      getConds(course,month).push({
        note:`${label} 特休＋換休合計上限 ${r.max} 人`,
        limitType:'special',
        specialDay:r.day,   // "m-d" string
        specialDayMonth:dm,
        specialDayDate:dd,
        specialMax:r.max
      });
    });

  }

  renderFillConds();
  rebuildCal();

function doExport(course,year,month){
  const people=ALL.filter(p=>p.課別===course);
  const dim=new Date(year,month,0).getDate();
  const dayOrder=[];for(let d=2;d<=dim;d++)dayOrder.push(d);dayOrder.push(1);
  const TN={s:'特休',c:'換休',b:'生日',o:'加班'};
  const rows=[
    ['工號','姓名','職稱',...dayOrder.map(d=>`${month}/${d}`)].join(','),
    ...people.map(p=>[p.工號,p.姓名,p.職稱,...dayOrder.map(d=>getLeave(course,p.姓名,year,month,d)?TN[getLeave(course,p.姓名,year,month,d)]:'')].join(','))
  ].join('\n');
  downloadCSV(rows,`日翊_${course}_${year}年${month}月假勤.csv`);
}

function doYewuExport(course,year,month){
  const key=getMaintKey(course,year,month);
  const d=getMaintByKey(key)||{yewuRows:[],tripRows:[]};
  const rows=[['課別','類型','人員/說明','日期','時段'].join(',')];
  (d.yewuRows||[]).forEach(r=>{if(r.date)rows.push([course,r.yw||'他業',r.person,r.date,r.time].join(','));});
  (d.tripRows||[]).forEach(r=>{(r.dates||[]).forEach(dt=>{rows.push([course,'出差-'+r.loc,r.person,dt,'整天'].join(','));});});
  downloadCSV(rows.join('\n'),`日翊_${course}_${year}年${month}月他業點檢.csv`);
  showResult(`✓ ${course} 他業點檢行事曆已下載`);
}

function exportYewuCalendar(){
  const month=parseInt(document.getElementById('exp-month').value),year=2026;
  const rows=[['課別','類型','人員/說明','日期','時段'].join(',')];
  COURSES.forEach(course=>{
    const key=getMaintKey(course,year,month);
    const d=getMaintByKey(key)||{yewuRows:[],tripRows:[]};
    (d.yewuRows||[]).forEach(r=>{if(r.date)rows.push([course,r.yw||'他業',r.person,r.date,r.time].join(','));});
    (d.tripRows||[]).forEach(r=>{(r.dates||[]).forEach(dt=>{rows.push([course,'出差-'+r.loc,r.person,dt,'整天'].join(','));});});
  });
  downloadCSV(rows.join('\n'),`日翊_全部課別_${year}年${month}月他業點檢行事曆.csv`);
  showResult(`✓ 全部課別他業點檢行事曆已下載`);
}

function downloadCSV(content,filename){
  const blob=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function showResult(msg){
  const el=document.getElementById('export-result');
  el.innerHTML=`<div style="background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);padding:8px 12px;border-radius:6px;font-size:12px">${msg}</div>`;
  setTimeout(()=>{el.innerHTML='';},4000);
}


function getConds(course,month){
  if(!conditionsMap[course])conditionsMap[course]={};
  if(!conditionsMap[course][month])conditionsMap[course][month]=[];
  return conditionsMap[course][month];
}
function getAllConds(month){
  // gather all courses' conditions for a given month (used for display)
  const all=[];
  Object.keys(conditionsMap).forEach(course=>{
    (conditionsMap[course][month]||[]).forEach(c=>all.push({...c,course}));
  });
  return all;
}
